# Reproducible-hash attestations for the zsnap testnet snapshot at height 75200.
#
# Each attester independently regenerated the snapshot at this pinned height from their own
# synced node, confirmed the manifest hash their export produced equals
# `canonical_manifest_hash`, and signed that hash with their own key. The hash is eligible to
# be blessed (added to Zebra's in-tree trusted-hash list) once at least `threshold` distinct
# attesters have each contributed a valid signature over the identical hash.
#
# Signatures use OpenSSH detached signatures (ssh-keygen -Y), namespace "zsnap-attestation",
# over the raw canonical hash string. verify.sh checks them.

network = "Testnet"
height = 75200
canonical_manifest_hash = "a5db82a2b922f0d402b737088e824153aa15285959044199ee3554667f320666"
threshold = 3
reproduce = "zebrad export-snapshot ./snap --cache-dir <synced testnet cache> --network Testnet"
# Signatures use the fixed OpenSSH namespace "zsnap-attestation" (hardcoded in verify.sh).

# 1 of 3. Origin self-report; does not count as independent on its own. Two more independent
# operators still need to reproduce and sign this exact hash before it is blessed on testnet.
[[attestation]]
attester = "Giri-Aayush"
identity = "aayush@nethermind.io"
date = "2026-07-15"
tool = "zebrad export-snapshot (fork prototype)"
manifest_hash = "a5db82a2b922f0d402b737088e824153aa15285959044199ee3554667f320666"
public_key = "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIJBLnWf62wN4RNvgzXpw+fuA7z6ITXXaV1SvD2pVR9+m aayush@nethermind.io"
signature_file = "sigs/testnet-75200.Giri-Aayush.sig"

